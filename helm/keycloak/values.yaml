# Настройки Keycloak
replicaCount: 1

image:
  repository: "quay.io/keycloak/keycloak"
  tag: "24.0.1"
  pullPolicy: "IfNotPresent"

service:
  type: "ClusterIP"
  port: 8080

resources:
  limits:
    cpu: "1000m"
    memory: "1024Mi"
  requests:
    cpu: "500m"
    memory: "512Mi"

# Настройки Keycloak
# ⚠️ В production переопределять через -f helm/values-secret.yaml (не коммитить в git!)
keycloak:
  adminUser: "admin"
  adminPassword: "admin"  # Заменить в production или использовать values-secret.yaml
  db: "dev-file"
  hostnameStrict: false
  hostnameStrictHttps: false
  hostnameUrl: "http://keycloak:8080"
  hostnameAdminUrl: "http://keycloak:8080"

# Realm конфигурация
realm:
  name: "bank"
  import: true

livenessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
