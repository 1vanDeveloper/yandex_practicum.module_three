# Настройки сервиса Notifications
replicaCount: 1

global:
  postgresql:
    host: "postgresql"
    port: 5432
    database: "bank"
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"
  consul:
    host: "consul"
    port: 8500

postgresql:
  username: "user"
  password: "password"

jwt:
  secret: "mySecretKeyForJWTTokenGenerationMustBeLongEnough"
  expiration: "86400000"

keycloak:
  issuerUri: "http://keycloak:8080/realms/bank"
  jwkSetUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/certs"

jpa:
  ddlMode: "validate"

logging:
  level: "INFO"

image:
  repository: "bank-notifications"
  tag: "latest"
  pullPolicy: "IfNotPresent"

service:
  type: "ClusterIP"
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: "/actuator/health/liveness"
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: "/actuator/health/readiness"
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
