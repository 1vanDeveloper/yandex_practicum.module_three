suite: Notifications Service Deployment Tests
templates:
  - deployment.yaml
tests:
  - it: should create deployment with correct name
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: notifications
      - equal:
          path: spec.selector.matchLabels.app
          value: notifications

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "bank-notifications:latest"

  - it: should configure probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /actuator/health/liveness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /actuator/health/readiness
---
suite: Notifications Service Tests
templates:
  - service.yaml
tests:
  - it: should create service with correct name
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: notifications
      - equal:
          path: spec.selector.app
          value: notifications
---
suite: Notifications NetworkPolicy Tests
templates:
  - networkpolicy.yaml
tests:
  - it: should create NetworkPolicy with correct name
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: notifications

  - it: should allow ingress from accounts, cash, and transfer
    asserts:
      - contains:
          path: spec.ingress[0].from
          content:
            podSelector:
              matchLabels:
                app: accounts
      - contains:
          path: spec.ingress[0].from
          content:
            podSelector:
              matchLabels:
                app: cash
      - contains:
          path: spec.ingress[0].from
          content:
            podSelector:
              matchLabels:
                app: transfer

  - it: should allow egress to PostgreSQL
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: postgresql
            ports:
              - port: 5432
                protocol: TCP
