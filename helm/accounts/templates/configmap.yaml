apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  labels:
    app: {{ .Chart.Name }}
data:
  # Application configuration
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SPRING_APPLICATION_NAME: "{{ .Chart.Name }}"

  # Database configuration (non-sensitive)
  DATABASE_URL: "jdbc:postgresql://{{ .Values.global.postgresql.host | default "postgresql" }}:{{ .Values.global.postgresql.port | default 5432 }}/{{ .Values.global.postgresql.database | default "bank" }}?currentSchema=accounts"
  SPRING_JPA_HIBERNATE_DDL_MODE: "{{ .Values.jpa.ddlMode }}"

  # OAuth2 Client Configuration (non-sensitive)
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ACCOUNTS_SERVICE_CLIENT_ID: "{{ .Chart.Name }}-client"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ACCOUNTS_SERVICE_AUTHORIZATION_GRANT_TYPE: "client_credentials"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ACCOUNTS_SERVICE_PROVIDER: "keycloak"

  # Logging
  LOGGING_LEVEL_RU_YANDEX_PRACTICUM_ACCOUNTS: "{{ .Values.logging.level }}"

  # Kafka Configuration
  KAFKA_ENABLED: "{{ .Values.global.kafka.enabled | default "true" }}"
  {{- if and .Values.global .Values.global.kafka .Values.global.kafka.bootstrapServers }}
  KAFKA_BOOTSTRAP_SERVERS: "{{ .Values.global.kafka.bootstrapServers }}"
  {{- else }}
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  {{- end }}
  SPRING_KAFKA_PRODUCER_KEY_SERIALIZER: "org.apache.kafka.common.serialization.StringSerializer"
  SPRING_KAFKA_PRODUCER_VALUE_SERIALIZER: "org.springframework.kafka.support.serializer.JsonSerializer"
  SPRING_KAFKA_PRODUCER_ACKS: "{{ .Values.kafka.producer.acks | default "all" }}"
  SPRING_KAFKA_PRODUCER_RETRIES: "{{ .Values.kafka.producer.retries | default 3 }}"
