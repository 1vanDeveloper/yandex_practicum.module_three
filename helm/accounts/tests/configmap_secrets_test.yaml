suite: Accounts ConfigMap and Secrets Tests
templates:
  - configmap.yaml
  - secrets.yaml
tests:
  - it: should create ConfigMap with correct name
    template: configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: accounts-config
      - equal:
          path: data.SPRING_PROFILES_ACTIVE
          value: "kubernetes"
      - equal:
          path: data.SPRING_APPLICATION_NAME
          value: accounts

  - it: should set correct database URL in ConfigMap
    template: configmap.yaml
    asserts:
      - equal:
          path: data.DATABASE_URL
          value: "jdbc:postgresql://postgresql:5432/bank?currentSchema=accounts"

  - it: should set correct JPA DDL mode in ConfigMap
    template: configmap.yaml
    asserts:
      - equal:
          path: data.SPRING_JPA_HIBERNATE_DDL_MODE
          value: validate

  - it: should set correct OAuth2 client ID in ConfigMap
    template: configmap.yaml
    asserts:
      - equal:
          path: data.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ACCOUNTS_SERVICE_CLIENT_ID
          value: accounts-client

  - it: should set correct logging level in ConfigMap
    template: configmap.yaml
    asserts:
      - equal:
          path: data.LOGGING_LEVEL_RU_YANDEX_PRACTICUM_ACCOUNTS
          value: INFO

  - it: should create Secret with correct name
    template: secrets.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: accounts-secrets
      - equal:
          path: type
          value: Opaque

  - it: should set database username in Secret
    template: secrets.yaml
    asserts:
      - equal:
          path: stringData.DATABASE_USERNAME
          value: user
      - equal:
          path: stringData.DATABASE_PASSWORD
          value: password

  - it: should set JWT secret in Secret
    template: secrets.yaml
    asserts:
      - equal:
          path: stringData.JWT_SECRET
          value: mySecretKeyForJWTTokenGenerationMustBeLongEnough
      - equal:
          path: stringData.JWT_EXPIRATION
          value: "86400000"

  - it: should set OAuth2 client secret in Secret
    template: secrets.yaml
    asserts:
      - equal:
          path: stringData.OAUTH2_CLIENT_SECRET
          value: accounts-secret

  - it: should set Keycloak URIs in Secret
    template: secrets.yaml
    asserts:
      - equal:
          path: stringData.KEYCLOAK_ISSUER_URI
          value: http://keycloak:8080/realms/bank
      - equal:
          path: stringData.KEYCLOAK_JWK_SET_URI
          value: http://keycloak:8080/realms/bank/protocol/openid-connect/certs

  - it: should allow custom JWT secret
    template: secrets.yaml
    set:
      secrets:
        JWT_SECRET: "myCustomSecretKey123"
    asserts:
      - equal:
          path: stringData.JWT_SECRET
          value: myCustomSecretKey123
