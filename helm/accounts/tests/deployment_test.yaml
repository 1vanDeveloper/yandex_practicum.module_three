suite: Accounts Deployment Tests
templates:
  - deployment.yaml
tests:
  - it: should create deployment with correct name and labels
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: accounts
      - equal:
          path: metadata.labels.app
          value: accounts
      - equal:
          path: spec.selector.matchLabels.app
          value: accounts

  - it: should set correct replica count
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "bank-accounts:latest"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: should expose correct port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: should set environment variables from ConfigMap and Secrets
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == "SPRING_PROFILES_ACTIVE")].valueFrom.configMapKeyRef.name
          value: accounts-config
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == "DATABASE_PASSWORD")].valueFrom.secretKeyRef.name
          value: accounts-secrets
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == "JWT_SECRET")].valueFrom.secretKeyRef.name
          value: accounts-secrets

  - it: should configure liveness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /actuator/health/liveness
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 60
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10

  - it: should configure readiness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /actuator/health/readiness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 5

  - it: should set resource limits and requests
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "512Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "250m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "256Mi"

  - it: should allow custom replica count
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should allow custom image
    set:
      image:
        repository: "custom-accounts"
        tag: "v1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-accounts:v1.2.3"

  - it: should support nodeSelector
    set:
      nodeSelector:
        disktype: ssd
        zone: us-west-1
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.nodeSelector.zone
          value: us-west-1

  - it: should support affinity
    set:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: accounts
                topologyKey: kubernetes.io/hostname
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100

  - it: should support tolerations
    set:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "database"
          effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.template.spec.tolerations[0].value
          value: database
