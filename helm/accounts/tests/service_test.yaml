suite: Accounts Service Tests
templates:
  - service.yaml
tests:
  - it: should create service with correct name
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: accounts
      - equal:
          path: metadata.labels.app
          value: accounts

  - it: should use ClusterIP service type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose correct port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: should have correct selector
    asserts:
      - equal:
          path: spec.selector.app
          value: accounts

  - it: should allow custom service type
    set:
      service:
        type: NodePort
        port: 8081
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 8081

  - it: should support NodePort configuration
    set:
      service:
        type: NodePort
        nodePort: 30080
    asserts:
      - equal:
          path: spec.type
          value: NodePort
