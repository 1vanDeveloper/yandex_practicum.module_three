# Настройки сервиса Accounts
replicaCount: 1

global:
  postgresql:
    host: "postgresql"
    port: 5432
    database: "bank"
    username: "user"
    password: "password"
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"

# PostgreSQL настройки
postgresql:
  username: "user"
  password: "password"

# JWT настройки
jwt:
  secret: "mySecretKeyForJWTTokenGenerationMustBeLongEnough"
  expiration: "86400000"

# OAuth2 настройки
oauth2:
  clientId: "accounts-client"
  clientSecret: "accounts-secret"

# Keycloak настройки
keycloak:
  issuerUri: "http://keycloak:8080/realms/bank"
  jwkSetUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/certs"
  tokenUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/token"

# JPA настройки
jpa:
  ddlMode: "validate"

# Логирование
logging:
  level: "INFO"

image:
  repository: "bank-accounts"
  tag: "latest"
  pullPolicy: "IfNotPresent"

service:
  type: "ClusterIP"
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: "/actuator/health/liveness"
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: "/actuator/health/readiness"
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
