# Настройки сервиса Frontend
replicaCount: 1

global:
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"
  consul:
    host: "consul"
    port: 8500

gateway:
  serviceName: "gateway"

oauth2:
  clientId: "frontend-client"
  clientSecret: "frontend-secret"
  redirectUri: "http://localhost:8081/login/oauth2/code/frontend-client"

keycloak:
  issuerUri: "http://keycloak:8080/realms/bank"
  jwkSetUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/certs"
  authorizationUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/auth"
  tokenUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/token"
  userInfoUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/userinfo"

logging:
  level: "INFO"
  cloudLevel: "INFO"

image:
  repository: "bank-frontend"
  tag: "latest"
  pullPolicy: "IfNotPresent"

service:
  type: "ClusterIP"
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: "/actuator/health/liveness"
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: "/actuator/health/readiness"
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
