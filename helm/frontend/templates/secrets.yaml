apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-secrets
  labels:
    app: {{ .Chart.Name }}
type: Opaque
stringData:
  # OAuth2 Client Credentials
  # Default: frontend-secret (DEV ONLY)
  OAUTH2_CLIENT_SECRET: {{ .Values.secrets.OAUTH2_CLIENT_SECRET | default "frontend-secret" | quote }}

  # Keycloak URLs (non-sensitive, but kept in Secret for consistency)
  # Default: http://keycloak:8080/realms/bank (DEV ONLY)
  KEYCLOAK_ISSUER_URI: {{ .Values.secrets.KEYCLOAK_ISSUER_URI | default "http://keycloak:8080/realms/bank" | quote }}
  KEYCLOAK_JWK_SET_URI: {{ .Values.secrets.KEYCLOAK_JWK_SET_URI | default "http://keycloak:8080/realms/bank/protocol/openid-connect/certs" | quote }}
