suite: Frontend Service Deployment Tests
templates:
  - deployment.yaml
tests:
  - it: should create deployment with correct name
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: frontend
      - equal:
          path: spec.selector.matchLabels.app
          value: frontend

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "bank-frontend:latest"

  - it: should configure probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /actuator/health/liveness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /actuator/health/readiness

  - it: should set gateway service name environment variable
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == "GATEWAY_SERVICE_NAME")].valueFrom.configMapKeyRef.name
          value: frontend-config
---
suite: Frontend Service Tests
templates:
  - service.yaml
tests:
  - it: should create service with correct name
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: frontend
      - equal:
          path: spec.selector.app
          value: frontend

  - it: should use NodePort by default
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should expose correct port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should allow custom service type
    set:
      service:
        type: ClusterIP
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
---
suite: Frontend NetworkPolicy Tests
templates:
  - networkpolicy.yaml
tests:
  - it: should create NetworkPolicy with correct name
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: frontend

  - it: should allow egress to gateway and Keycloak
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: gateway
            ports:
              - port: 8080
                protocol: TCP
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: keycloak
            ports:
              - port: 8080
                protocol: TCP
