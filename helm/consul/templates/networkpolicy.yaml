apiVersion: network.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8500
        - protocol: TCP
          port: 8600
        - protocol: UDP
          port: 8600
        - protocol: TCP
          port: 8300
        - protocol: TCP
          port: 8301
        - protocol: UDP
          port: 8301
        - protocol: TCP
          port: 8302
        - protocol: UDP
          port: 8302
  egress: []
