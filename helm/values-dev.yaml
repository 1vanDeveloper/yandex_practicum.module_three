# Dev окружение - для разработки и тестирования
# Не содержит реальных секретов - используется для локальной разработки

# Глобальные настройки
global:
  imageRegistry: "registry.example.com/bank"
  imageTag: "latest"
  
  postgresql:
    host: "postgresql"
    port: 5432
    database: "bank"
  
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"

  kafka:
    enabled: false
    bootstrapServers: "kafka:9092"

# Accounts
accounts:
  replicaCount: 1
  image:
    repository: "bank-accounts"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# Cash
cash:
  replicaCount: 1
  image:
    repository: "bank-cash"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# Transfer
transfer:
  replicaCount: 1
  image:
    repository: "bank-transfer"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# Notifications
notifications:
  replicaCount: 1
  image:
    repository: "bank-notifications"
    tag: "latest"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# Gateway
gateway:
  replicaCount: 1
  image:
    repository: "bank-gateway"
    tag: "latest"
  service:
    type: "ClusterIP"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# Frontend
frontend:
  replicaCount: 1
  image:
    repository: "bank-frontend"
    tag: "latest"
  service:
    type: "NodePort"
    nodePort: 30144
  ingress:
    enabled: false
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

# PostgreSQL
postgresql:
  replicaCount: 1
  image:
    repository: "postgres"
    tag: "14"
  resources:
    limits:
      cpu: "1000m"
      memory: "1024Mi"
    requests:
      cpu: "500m"
      memory: "512Mi"
  persistence:
    enabled: false

# Keycloak
keycloak:
  replicaCount: 1
  image:
    repository: "quay.io/keycloak/keycloak"
    tag: "24.0.1"
  keycloak:
    adminUser: "admin"
    adminPassword: "admin"
    db: "dev-file"
  resources:
    limits:
      cpu: "1000m"
      memory: "1024Mi"
    requests:
      cpu: "500m"
      memory: "512Mi"

# Kafka
kafka:
  enabled: false
  replicaCount: 1
  image:
    repository: "confluentinc/cp-kafka"
    tag: "7.5.0"
  kafka:
    clusterId: "bank-kafka-dev"
    autoCreateTopicsEnable: true
    defaultReplicationFactor: 1
    offsetsTopicReplicationFactor: 1
    transactionStateLogReplicationFactor: 1
    transactionStateLogMinIsr: 1
    controllerQuorumVoters: "0@kafka-0.kafka-headless:9093"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  persistence:
    enabled: false
  podDisruptionBudget:
    enabled: false
  networkPolicy:
    enabled: true
    allowExternal: false
