apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-init-scripts
  labels:
    app: {{ .Chart.Name }}
data:
  1-init.sql: |
    -- Создание схем для каждого сервиса
    {{- range .Values.schemas }}
    CREATE SCHEMA IF NOT EXISTS {{ . }};
    {{- end }}
    
    -- Таблица accounts.accounts
    CREATE TABLE IF NOT EXISTS accounts.accounts (
        id BIGSERIAL PRIMARY KEY,
        user_id VARCHAR(255) NOT NULL,
        account_number VARCHAR(20) NOT NULL UNIQUE,
        balance DECIMAL(19, 2) NOT NULL DEFAULT 0.00,
        currency VARCHAR(3) NOT NULL DEFAULT 'RUB',
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Таблица accounts.outbox
    CREATE TABLE IF NOT EXISTS accounts.outbox (
        id BIGSERIAL PRIMARY KEY,
        event_type VARCHAR(255) NOT NULL,
        payload JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        processed BOOLEAN DEFAULT FALSE
    );
    
    -- Таблица cash.cash_operations
    CREATE TABLE IF NOT EXISTS cash.cash_operations (
        id BIGSERIAL PRIMARY KEY,
        account_id BIGINT NOT NULL,
        operation_type VARCHAR(50) NOT NULL,
        amount DECIMAL(19, 2) NOT NULL,
        currency VARCHAR(3) NOT NULL,
        status VARCHAR(50) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Таблица cash.outbox
    CREATE TABLE IF NOT EXISTS cash.outbox (
        id BIGSERIAL PRIMARY KEY,
        event_type VARCHAR(255) NOT NULL,
        payload JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        processed BOOLEAN DEFAULT FALSE
    );
    
    -- Таблица transfer.transfers
    CREATE TABLE IF NOT EXISTS transfer.transfers (
        id BIGSERIAL PRIMARY KEY,
        from_account_id BIGINT NOT NULL,
        to_account_id BIGINT NOT NULL,
        amount DECIMAL(19, 2) NOT NULL,
        currency VARCHAR(3) NOT NULL,
        status VARCHAR(50) NOT NULL,
        idempotency_key VARCHAR(255) UNIQUE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Таблица transfer.outbox
    CREATE TABLE IF NOT EXISTS transfer.outbox (
        id BIGSERIAL PRIMARY KEY,
        event_type VARCHAR(255) NOT NULL,
        payload JSONB NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        processed BOOLEAN DEFAULT FALSE
    );
    
    -- Таблица notifications.notifications
    CREATE TABLE IF NOT EXISTS notifications.notifications (
        id BIGSERIAL PRIMARY KEY,
        user_id VARCHAR(255) NOT NULL,
        type VARCHAR(50) NOT NULL,
        message TEXT NOT NULL,
        status VARCHAR(50) NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        sent_at TIMESTAMP WITH TIME ZONE
    );
