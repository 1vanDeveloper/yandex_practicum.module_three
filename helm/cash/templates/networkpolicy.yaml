apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from gateway
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow traffic to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow traffic to Keycloak (for OAuth2)
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic to accounts (if needed for cross-service calls)
    - to:
        - podSelector:
            matchLabels:
              app: accounts
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic to notifications
    - to:
        - podSelector:
            matchLabels:
              app: notifications
      ports:
        - protocol: TCP
          port: 8080
