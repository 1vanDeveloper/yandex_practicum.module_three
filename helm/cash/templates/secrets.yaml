apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-secrets
  labels:
    app: {{ .Chart.Name }}
type: Opaque
stringData:
  # PostgreSQL credentials
  # Default: user/password (DEV ONLY - override in production)
  DATABASE_USERNAME: {{ .Values.secrets.DATABASE_USERNAME | default "user" | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.DATABASE_PASSWORD | default "password" | quote }}

  # JWT Configuration
  # Default: mySecretKeyForJWTTokenGenerationMustBeLongEnough/86400000 (DEV ONLY)
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | default "mySecretKeyForJWTTokenGenerationMustBeLongEnough" | quote }}
  JWT_EXPIRATION: {{ .Values.secrets.JWT_EXPIRATION | default "86400000" | quote }}

  # OAuth2 Client Credentials
  # Default: cash-secret (DEV ONLY)
  OAUTH2_CLIENT_SECRET: {{ .Values.secrets.OAUTH2_CLIENT_SECRET | default "cash-secret" | quote }}

  # Keycloak URLs (non-sensitive, but kept in Secret for consistency)
  # Default: http://keycloak:8080/realms/bank (DEV ONLY)
  KEYCLOAK_ISSUER_URI: {{ .Values.secrets.KEYCLOAK_ISSUER_URI | default "http://keycloak:8080/realms/bank" | quote }}
  KEYCLOAK_JWK_SET_URI: {{ .Values.secrets.KEYCLOAK_JWK_SET_URI | default "http://keycloak:8080/realms/bank/protocol/openid-connect/certs" | quote }}
