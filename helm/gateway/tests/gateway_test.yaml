suite: Gateway Service Deployment Tests
templates:
  - deployment.yaml
tests:
  - it: should create deployment with correct name
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: gateway
      - equal:
          path: spec.selector.matchLabels.app
          value: gateway

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "bank-gateway:latest"

  - it: should configure probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /actuator/health/liveness
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /actuator/health/readiness

  - it: should set OAuth2 client ID environment variable
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[?(@.name == "SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SERVICE_CLIENT_ID")].valueFrom.configMapKeyRef.name
          value: gateway-config
---
suite: Gateway Service Tests
templates:
  - service.yaml
tests:
  - it: should create service with correct name
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: gateway
      - equal:
          path: spec.selector.app
          value: gateway
---
suite: Gateway NetworkPolicy Tests
templates:
  - networkpolicy.yaml
tests:
  - it: should create NetworkPolicy with correct name
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: gateway

  - it: should allow egress to all backend services
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: accounts
            ports:
              - port: 8080
                protocol: TCP
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: cash
            ports:
              - port: 8080
                protocol: TCP
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: transfer
            ports:
              - port: 8080
                protocol: TCP
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: notifications
            ports:
              - port: 8080
                protocol: TCP
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app: keycloak
            ports:
              - port: 8080
                protocol: TCP
