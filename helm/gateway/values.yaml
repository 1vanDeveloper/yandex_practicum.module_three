# Настройки сервиса Gateway
replicaCount: 1

global:
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"
  consul:
    host: "consul"
    port: 8500

jwt:
  secret: "mySecretKeyForJWTTokenGenerationMustBeLongEnough"
  expiration: "86400000"

oauth2:
  clientId: "gateway-client"
  clientSecret: "gateway-secret"

keycloak:
  issuerUri: "http://keycloak:8080/realms/bank"
  jwkSetUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/certs"
  tokenUri: "http://keycloak:8080/realms/bank/protocol/openid-connect/token"

logging:
  level: "DEBUG"
  gatewayLevel: "DEBUG"
  securityLevel: "DEBUG"

image:
  repository: "bank-gateway"
  tag: "latest"
  pullPolicy: "IfNotPresent"

service:
  type: "LoadBalancer"
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: "/actuator/health/liveness"
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: "/actuator/health/readiness"
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
