# Настройки сервиса Gateway
replicaCount: 1

global:
  keycloak:
    url: "http://keycloak:8080"
    realm: "bank"

# Переменные окружения (не чувствительные)
env:
  JAVA_OPTS: "-Xmx512m -Xms256m"
  LOGGING_LEVEL_ROOT: "INFO"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"

# Секреты (чувствительные данные)
# ⚠️ В production переопределять через --set или values-secret.yaml (не коммитить в git!)
secrets:
  # JWT Configuration (DEV default: mySecretKeyForJWTTokenGenerationMustBeLongEnough)
  JWT_SECRET: "mySecretKeyForJWTTokenGenerationMustBeLongEnough"
  JWT_EXPIRATION: "86400000"
  
  # OAuth2 Client Credentials (DEV default: gateway-secret)
  OAUTH2_CLIENT_SECRET: "gateway-secret"
  
  # Keycloak URLs (DEV default: http://keycloak:8080/realms/bank)
  KEYCLOAK_ISSUER_URI: "http://keycloak:8080/realms/bank"
  KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/bank/protocol/openid-connect/certs"

# Логирование
logging:
  level: "DEBUG"
  gatewayLevel: "DEBUG"
  securityLevel: "DEBUG"

image:
  repository: "bank-gateway"
  tag: "latest"
  pullPolicy: "IfNotPresent"

service:
  type: "LoadBalancer"
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: "/actuator/health/liveness"
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: "/actuator/health/readiness"
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 5
