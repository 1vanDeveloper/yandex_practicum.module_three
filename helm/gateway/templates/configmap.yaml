apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  labels:
    app: {{ .Chart.Name }}
data:
  SPRING_PROFILES_ACTIVE: "kubernetes"
  SPRING_APPLICATION_NAME: "{{ .Chart.Name }}"
  SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED: "true"
  SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID: "true"

  # OAuth2 Client Configuration (non-sensitive)
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SERVICE_CLIENT_ID: "{{ .Chart.Name }}-client"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SERVICE_AUTHORIZATION_GRANT_TYPE: "client_credentials"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SERVICE_PROVIDER: "keycloak"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SERVICE_SCOPE: "accounts:modify,cash:modify,transfer:modify"

  # Management endpoints
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,routes"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"

  # Logging
  LOGGING_LEVEL_RU_YANDEX_PRACTICUM_GATEWAY: "{{ .Values.logging.level }}"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY: "{{ .Values.logging.gatewayLevel }}"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "{{ .Values.logging.securityLevel }}"
