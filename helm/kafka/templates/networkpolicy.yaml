{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Разрешить входящий трафик Kafka от других подов в кластере
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: bank
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
    # Разрешить входящий трафик из указанных namespace
    {{- if .Values.networkPolicy.allowNamespaces }}
    {{- range .Values.networkPolicy.allowNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ . }}
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
    {{- end }}
    # Разрешить внешний трафик если allowExternal = true
    {{- if .Values.networkPolicy.allowExternal }}
    - from: []
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
  egress:
    # Разрешить исходящий трафик для связи между брокерами Kafka
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
    # Разрешить исходящий DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
