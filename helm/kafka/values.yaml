# Настройки Kafka кластера
replicaCount: 1

image:
  repository: "confluentinc/cp-kafka"
  tag: "7.5.0"
  pullPolicy: "IfNotPresent"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container Security Context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Kafka конфигурация
kafka:
  clusterId: "bank-kafka-cluster"
  brokerId: 0  # Будет установлен автоматически для каждого пода
  listeners:
    - "PLAINTEXT://0.0.0.0:9092"
    - "CONTROLLER://0.0.0.0:9093"
  advertisedListeners:
    - "PLAINTEXT://kafka-0.kafka-headless:9092"
    - "PLAINTEXT://kafka-1.kafka-headless:9092"
    - "PLAINTEXT://kafka-2.kafka-headless:9092"
  listenerSecurityProtocolMap:
    - "CONTROLLER:PLAINTEXT"
    - "PLAINTEXT:PLAINTEXT"
  interBrokerListenerName: "PLAINTEXT"
  controllerListenerNames: "CONTROLLER"
  controllerQuorumVoters: "0@kafka-0.kafka-headless:9093,1@kafka-1.kafka-headless:9093,2@kafka-2.kafka-headless:9093"
  
  # Настройки топиков по умолчанию
  defaultReplicationFactor: 1
  offsetsTopicReplicationFactor: 1
  transactionStateLogReplicationFactor: 1
  transactionStateLogMinIsr: 1
  
  # Логирование
  logRetentionHours: 168  # 7 дней
  logSegmentBytes: 1073741824  # 1GB
  
  # Auto-create topics (отключить в production!)
  autoCreateTopicsEnable: true

# ZooKeeper (встроенный в Kafka 3.x - KRaft mode)
zookeeper:
  enabled: false  # Используем KRaft mode без ZooKeeper

# Сервис
service:
  type: "ClusterIP"
  port: 9092
  controllerPort: 9093
  annotations: {}

# Headless сервис для StatefulSet
headless:
  service:
    annotations: {}
    port: 9092
    controllerPort: 9093

# Ресурсы
resources:
  limits:
    cpu: "2000m"
    memory: "2048Mi"
  requests:
    cpu: "1000m"
    memory: "1024Mi"

# Хранилище
persistence:
  enabled: true
  size: "10Gi"
  storageClass: ""  # Использовать storageClass по умолчанию
  accessModes:
    - "ReadWriteOnce"
  annotations: {}

# Переменные окружения
env:
  KAFKA_HEAP_OPTS: "-Xmx1024m -Xms1024m"
  CLUSTER_ID: "bank-kafka-cluster"

# Логирование
logging:
  level: "INFO"

# Probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# Стратегия обновления
strategy:
  type: "RollingUpdate"

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Network Policy
networkPolicy:
  enabled: true
  allowExternal: false
  allowNamespaces: []

# Service Monitor для Prometheus
serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
