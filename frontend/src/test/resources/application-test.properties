# Test profile configuration
spring.security.enabled=false

# Gateway service URL for tests
gateway.service.url=http://localhost:8086

# Disable OAuth2 for tests
spring.security.oauth2.client.registration.frontend-service.enabled=false

# Disable Consul for tests
spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false

# Disable OAuth2 Resource Server for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/mybank-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/mybank-realm/protocol/openid-connect/certs
