<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Вход - Банк</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0 text-center">Вход в Банк</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-success" role="alert" th:if="${success}">
                            <span th:text="${success}"/>
                        </div>
                        <div class="alert alert-danger" role="alert" th:if="${errors!=null}" th:each="error : ${errors}">
                            <span th:text="${error}"/>
                        </div>

                        <form th:action="@{/login}" method="post" th:object="${loginRequest}">
                            <div class="mb-3">
                                <label for="username" class="form-label">Логин</label>
                                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Введите логин" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Введите пароль" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Войти</button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <p class="mb-0">Нет аккаунта?</p>
                            <a th:href="@{/register}" class="btn btn-outline-secondary w-100 mt-2">Зарегистрироваться</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprnPbN84VDd0OwFRde9bT3K3j8k4KqQi4tPejhQOjoK/Cl5yKQrDN0K9rwO1Kzx" crossorigin="anonymous"></script>
</body>

</html>
