<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Регистрация - Банк</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0 text-center">Регистрация в Банке</h4>
                    </div>
                    <div class="card-body">
                        <!-- Сообщение об успешной регистрации -->
                        <div class="alert alert-success" role="alert" th:if="${param.registered}">
                            <span>Регистрация успешна! Теперь вы можете войти.</span>
                        </div>

                        <!-- Сообщение об ошибке регистрации -->
                        <div class="alert alert-danger" role="alert" th:if="${param.error}">
                            <span>Ошибка регистрации. Попробуйте еще раз.</span>
                        </div>

                        <!-- Форма регистрации -->
                        <form th:action="@{/api/auth/register}" method="post">
                            <div class="mb-3">
                                <label for="login" class="form-label">Логин</label>
                                <input type="text" class="form-control" id="login" name="login" required autofocus minlength="3">
                                <div class="form-text">Минимум 3 символа</div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" name="password" required minlength="6">
                                <div class="form-text">Минимум 6 символов</div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">Имя</label>
                                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Фамилия</label>
                                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="birthDate" class="form-label">Дата рождения</label>
                                <input type="date" class="form-control" id="birthDate" name="birthDate" required>
                                <div class="form-text">Должно быть старше 18 лет</div>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center mt-3">
                            <p class="mb-0">Уже есть аккаунт?</p>
                            <a th:href="@{/login}" class="btn btn-outline-primary w-100 mt-2">Войти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprnPbN84VDd0OwFRde9bT3K3j8k4KqQi4tPejhQOjoK/Cl5yKQrDN0K9rwO1Kzx" crossorigin="anonymous"></script>
</body>

</html>
