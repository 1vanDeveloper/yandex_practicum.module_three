spring.application.name=frontend
server.port=8080

# Security
spring.security.enabled=true

# OAuth2 Client для аутентификации пользователей через Keycloak (Authorization Code Flow)
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:8180/realms/bank/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8180/realms/bank/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://localhost:8180/realms/bank/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
spring.security.oauth2.client.registration.frontend-client.client-id=frontend-client
spring.security.oauth2.client.registration.frontend-client.client-secret=frontend-secret
spring.security.oauth2.client.registration.frontend-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.frontend-client.redirect-uri=http://localhost:8081/login/oauth2/code/keycloak
spring.security.oauth2.client.registration.frontend-client.scope=openid,profile,email
spring.security.oauth2.client.registration.frontend-client.provider=keycloak

# OAuth2 Resource Server для валидации JWT токенов
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# Gateway service URL (default for local development, overridden by Consul in Docker)
gateway.service.url=http://localhost:8086

# Consul service discovery
spring.cloud.consul.enabled=true
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.service-name=gateway

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.ru.yandex.practicum.mybankfront=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
