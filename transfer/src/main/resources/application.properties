spring.application.name=transfer-service
server.port=8080

# Spring Cloud Consul Configuration
spring.config.import=optional:consul:
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.fail-fast=false
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-critical-timeout=1m

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bank?currentSchema=transfer
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Keycloak OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# Keycloak OAuth2 Client (Client Credentials Flow)
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8180/realms/bank/protocol/openid-connect/token
spring.security.oauth2.client.registration.transfer-service.client-id=transfer-client
spring.security.oauth2.client.registration.transfer-service.client-secret=transfer-secret
spring.security.oauth2.client.registration.transfer-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.transfer-service.provider=keycloak

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.ru.yandex.practicum.transfer=DEBUG
logging.level.org.springframework.security=DEBUG

# Async configuration
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
