spring.application.name=transfer-service
server.port=8080

# Test Database configuration (H2 for unit tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS transfer
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-mode=create-drop
spring.jpa.show-sql=true

# Disable Keycloak for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080

# Disable OAuth2 client for tests
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8080

# Allow bean definition overriding in tests
spring.main.allow-bean-definition-overriding=true

# Disable security for tests
spring.security.enabled=false

# Logging
logging.level.ru.yandex.practicum.transfer=DEBUG
logging.level.org.springframework.security=ERROR
