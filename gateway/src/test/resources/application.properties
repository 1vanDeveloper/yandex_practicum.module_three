spring.application.name=gateway-test
server.port=8080

# JWT Configuration - симметричный ключ для тестов
jwt.secret=testSecretKeyForJWTTokenGenerationMustBeLongEnough
jwt.expiration=86400000

# OAuth2 Resource Server - отключаем для тестов
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://test-issuer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://test-issuer/certs

# OAuth2 Client Credentials - отключаем для тестов
spring.security.oauth2.client.enabled=false

# Consul (disabled for tests)
spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false

# Gateway
spring.cloud.gateway.discovery.locator.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.ru.yandex.practicum.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
