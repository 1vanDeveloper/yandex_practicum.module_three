spring.application.name=gateway
server.port=8080

# Security - OAuth2 Resource Server for validating user tokens from frontend
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# OAuth2 Client Credentials for inter-service communication
spring.security.oauth2.client.registration.gateway_service.client-id=gateway-client
spring.security.oauth2.client.registration.gateway_service.client-secret=gateway-secret
spring.security.oauth2.client.registration.gateway_service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway_service.provider=keycloak
spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/bank/protocol/openid-connect/token

# Consul service discovery
spring.cloud.consul.enabled=true
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}

# Backend services URLs (using Consul service discovery)
services.accounts.url=http://accounts-service
services.cash.url=http://cash-service
services.transfer.url=http://transfer-service

# Keycloak Admin Client Configuration for user management
keycloak.admin-server-url=http://keycloak:8080
keycloak.admin-realm=master
keycloak.admin-client-id=admin-cli
keycloak.admin-username=admin
keycloak.admin-password=admin
keycloak.target-realm=bank

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.ru.yandex.practicum.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.client=DEBUG
