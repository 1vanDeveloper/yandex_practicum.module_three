spring.application.name=gateway
server.port=8080

# Security
spring.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# OAuth2 Client Credentials for calling backend services
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8180/realms/bank/protocol/openid-connect/token
spring.security.oauth2.client.registration.gateway-service.client-id=gateway-client
spring.security.oauth2.client.registration.gateway-service.client-secret=gateway-secret
spring.security.oauth2.client.registration.gateway-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway-service.provider=keycloak
spring.security.oauth2.client.registration.gateway-service.scope=accounts:modify,cash:modify,transfer:modify

# Backend services URLs (default for local development)
services.accounts.url=http://localhost:8082
services.cash.url=http://localhost:8084
services.transfer.url=http://localhost:8085

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.ru.yandex.practicum.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
