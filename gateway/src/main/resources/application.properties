spring.application.name=gateway
server.port=8080

# Spring Cloud Compatibility Verifier - отключаем для Spring Boot 4.0.6
spring.cloud.compatibility-verifier.enabled=false

# ==========================================
# JWT Configuration for User Token Validation
# ==========================================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeLongEnough}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# OAuth2 Resource Server (для валидации JWT от Keycloak)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/bank}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/bank/protocol/openid-connect/certs}

# ==========================================
# OAuth2 Client Credentials (для межсервисных вызовов)
# ==========================================
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/bank/protocol/openid-connect/token}
spring.security.oauth2.client.registration.gateway-service.client-id=${GATEWAY_CLIENT_ID:gateway-client}
spring.security.oauth2.client.registration.gateway-service.client-secret=${GATEWAY_CLIENT_SECRET:gateway-secret}
spring.security.oauth2.client.registration.gateway-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway-service.provider=keycloak
spring.security.oauth2.client.registration.gateway-service.scope=accounts:modify,cash:modify,transfer:modify

# ==========================================
# Spring Cloud Consul (Service Discovery)
# ==========================================
spring.cloud.consul.host=${SPRING_CLOUD_CONSUL_HOST:localhost}
spring.cloud.consul.port=${SPRING_CLOUD_CONSUL_PORT:8500}
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.fail-fast=false
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.service-name=${spring.application.name}
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=5s
spring.cloud.consul.discovery.health-check-critical-timeout=30s
spring.cloud.consul.discovery.deregister=true
spring.cloud.consul.discovery.heartbeat.enabled=true
spring.cloud.consul.discovery.heartbeat.interval=5s

# ==========================================
# Spring Cloud Gateway Routes
# ==========================================
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# Resilience4j Circuit Breaker Configuration
# ==========================================
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED

# Resilience4j Retry Configuration
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2

# Resilience4j Timelimiter Configuration
resilience4j.timelimiter.configs.default.timeoutDuration=5s

# ==========================================
# Actuator (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# Logging
# ==========================================
logging.level.ru.yandex.practicum.gateway=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=INFO
