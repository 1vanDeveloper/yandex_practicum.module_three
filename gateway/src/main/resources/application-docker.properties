spring.application.name=gateway
server.port=8080

# ==========================================
# JWT Configuration for User Token Validation
# ==========================================
jwt.secret=mySecretKeyForJWTTokenGenerationMustBeLongEnough
jwt.expiration=86400000

# ==========================================
# OAuth2 Resource Server (для валидации JWT от Keycloak)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/bank/protocol/openid-connect/certs

# ==========================================
# OAuth2 Client Credentials (для межсервисных вызовов)
# ==========================================
spring.security.oauth2.client.provider.keycloak.token-uri=http://keycloak:8080/realms/bank/protocol/openid-connect/token
spring.security.oauth2.client.registration.gateway_service.client-id=gateway-client
spring.security.oauth2.client.registration.gateway_service.client-secret=gateway-secret
spring.security.oauth2.client.registration.gateway_service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway_service.provider=keycloak
spring.security.oauth2.client.registration.gateway_service.scope=accounts:modify,cash:modify,transfer:modify

# ==========================================
# Spring Cloud Consul (Service Discovery)
# ==========================================
spring.cloud.consul.host=consul
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.service-name=${spring.application.name}

# ==========================================
# Spring Cloud Gateway Routes
# ==========================================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# Actuator (Health Checks)
# ==========================================
management.endpoints.web.exposure.include=health,info,routes
management.endpoint.health.show-details=always

# ==========================================
# Logging
# ==========================================
logging.level.ru.yandex.practicum.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security=DEBUG
