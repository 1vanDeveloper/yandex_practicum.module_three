# Accounts Service Configuration
spring.application.name=accounts
spring.cloud.compatibility-verifier.enabled=false

# Server configuration
server.port=8080

# Virtual threads (Java 21+)
spring.threads.virtual.enabled=true

# SpringDoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.default-produces-media-type=application/json

# JWT secret for token generation and validation
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeLongEnough}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Keycloak OAuth2 Resource Server (для валидации JWT от других сервисов)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/bank}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/bank/protocol/openid-connect/certs}

# Keycloak OAuth2 Client (для Client Credentials Flow при запросах в Notifications)
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/bank/protocol/openid-connect/token}
spring.security.oauth2.client.registration.accounts-service.client-id=${ACCOUNTS_CLIENT_ID:accounts-client}
spring.security.oauth2.client.registration.accounts-service.client-secret=${ACCOUNTS_CLIENT_SECRET:accounts-secret}
spring.security.oauth2.client.registration.accounts-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.accounts-service.provider=keycloak
spring.security.oauth2.client.enabled=true

# Security enabled (for OAuth2 client)
spring.security.enabled=true

# ==========================================
# Resilience4j Circuit Breaker Configuration
# ==========================================
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED

# Resilience4j Retry Configuration
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=1s
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=2

# Resilience4j Timelimiter Configuration
resilience4j.timelimiter.configs.default.timeoutDuration=5s

# Outbox scheduler enabled
outbox.scheduler.enabled=true
spring.scheduling.enabled=true

# Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bank?currentSchema=accounts}
spring.datasource.username=${DATABASE_USERNAME:user}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Notifications service URL
notifications.service.url=${NOTIFICATIONS_SERVICE_URL:http://notifications:8080}
