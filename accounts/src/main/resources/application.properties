# Payment Service Configuration
spring.application.name=accounts-service

# Spring Cloud Consul Configuration
spring.config.import=optional:consul:
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.fail-fast=false
spring.cloud.consul.config.watch.enabled=true
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}
spring.cloud.consul.discovery.service-name=${spring.application.name}
spring.cloud.compatibility-verifier.enabled=false

# Server configuration
server.port=8080

# SpringDoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.default-produces-media-type=application/json

# Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bank?currentSchema=accounts
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# OAuth2 Resource Server Configuration (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# OAuth2 Client Configuration (Client Credentials Flow for service-to-service)
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8180/realms/bank/protocol/openid-connect/token
spring.security.oauth2.client.registration.accounts-service.client-id=accounts-client
spring.security.oauth2.client.registration.accounts-service.client-secret=accounts-secret
spring.security.oauth2.client.registration.accounts-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.accounts-service.provider=keycloak
spring.security.oauth2.client.registration.accounts-service.scope=notifications:send