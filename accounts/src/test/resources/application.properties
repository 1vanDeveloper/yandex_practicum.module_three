# Active profile for tests (enables TestSecurityConfig)
spring.profiles.active=test

# Disable Spring Cloud Config and Consul for tests
spring.config.import=optional:none
spring.cloud.config.enabled=false
spring.cloud.consul.enabled=false
spring.cloud.consul.config.enabled=false
spring.cloud.consul.discovery.enabled=false

# Database configuration for tests (use PostgreSQL from Kubernetes via port-forward)
# Run: kubectl port-forward svc/postgresql 5432:5432
spring.datasource.url=jdbc:postgresql://localhost:5432/bank
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.properties.hibernate.default_schema=accounts
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_new_id_generator_mappings=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Disable scheduling in tests
spring.scheduling.enabled=false
