# Active profile for tests (enables TestSecurityConfig)
spring.profiles.active=test

# OAuth2 Resource Server Configuration for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs

# Spring Cloud Consul configuration for tests
spring.config.import=consul:localhost:8500
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.fail-fast=false
spring.cloud.consul.discovery.enabled=false
spring.cloud.consul.service-registry.auto-registration.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

# Database configuration for tests (use Docker Postgres from docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/bank
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.show-sql=false

# Disable scheduling in tests
spring.scheduling.enabled=false