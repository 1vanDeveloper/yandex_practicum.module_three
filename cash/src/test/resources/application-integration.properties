# Integration test configuration for Cash Service
# Uses real PostgreSQL from Kubernetes cluster via port-forward

spring.application.name=cash-service-integration

# Disable Spring Cloud Config and Consul for tests
spring.config.import=optional:none
spring.cloud.config.enabled=false
spring.cloud.consul.enabled=false
spring.cloud.consul.config.enabled=false
spring.cloud.consul.discovery.enabled=false

# Disable security for basic integration tests
spring.security.enabled=false

# Server configuration
server.port=0

# Disable OpenAPI for tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# PostgreSQL Database (from Kubernetes via kubectl port-forward svc/postgresql 5432:5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/bank?currentSchema=cash
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_new_id_generator_mappings=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Logging
logging.level.ru.yandex.practicum.cash=DEBUG

# ==========================================
# Kafka Configuration (Integration Test)
# ==========================================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
kafka.topic.notifications=notifications.events
