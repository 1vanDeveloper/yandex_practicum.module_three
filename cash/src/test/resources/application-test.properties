# Test configuration for Cash Service (profile: test)
spring.application.name=cash-service-test

# Disable Spring Cloud Config and Consul for tests
spring.config.import=optional:none
spring.cloud.config.enabled=false
spring.cloud.consul.enabled=false
spring.cloud.consul.config.enabled=false
spring.cloud.consul.discovery.enabled=false

# H2 in-memory database for unit tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS cash
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-mode=create-drop
spring.jpa.show-sql=true

# Disable security for tests
spring.security.enabled=false

# Server configuration
server.port=0

# Disable OpenAPI for tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.ru.yandex.practicum.cash=DEBUG
logging.level.org.springframework.security=ERROR
