# Integration test configuration with Keycloak JWT validation enabled
# Uses real PostgreSQL and Keycloak from docker-compose

spring.application.name=notifications-service-integration-keycloak

# Disable Consul for integration tests
spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false
spring.cloud.consul.config.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

# Enable security with real Keycloak validation
spring.security.enabled=true

# Server configuration
server.port=0

# Disable OpenAPI for tests
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# PostgreSQL Database (from docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/bank?currentSchema=notifications
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-mode=validate
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.use_new_id_generator_mappings=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# OAuth2 Resource Server - Keycloak (from docker-compose)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/bank/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/bank

# Logging
logging.level.ru.yandex.practicum.notifications=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.oauth2=DEBUG
